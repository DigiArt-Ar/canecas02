<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <style>
      :root { --azul-digiart: #003366; --branco: #ffffff; --detalhe-ar: #00aaff; --amarelo: #ffca28; }
      body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Roboto, sans-serif; background: #000; }
      
      .interface {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; flex-direction: column; align-items: center;
        justify-content: center; z-index: 9999; text-align: center;
        padding: 20px; box-sizing: border-box; backdrop-filter: blur(12px);
        color: var(--branco); background: rgba(0, 51, 102, 0.95);
      }

      .marca { font-size: 42px; font-weight: bold; letter-spacing: 2px; margin-bottom: 5px; }
      .marca span { color: var(--detalhe-ar); }
      .subtitulo { font-size: 14px; opacity: 0.8; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 3px; }

      .input-token {
        width: 80%; max-width: 250px; padding: 15px; border-radius: 10px;
        border: none; font-size: 20px; text-align: center; margin-bottom: 15px;
        text-transform: lowercase; color: var(--azul-digiart); font-weight: bold;
      }

      .btn {
        padding: 18px 40px; border-radius: 50px; border: 2px solid var(--branco);
        background: var(--branco); color: var(--azul-digiart);
        font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3); width: 80%; max-width: 250px;
      }
      .btn:active { transform: scale(0.95); background: transparent; color: white; }
      
      #status-msg { margin-top: 15px; font-size: 14px; font-weight: bold; min-height: 20px; }
      p { font-size: 16px; line-height: 1.4; max-width: 300px; margin-bottom: 25px; }
      .a-enter-vr { display: none !important; }
    </style>
  </head>
  <body>

    <div id="tela-bloqueio" class="interface">
      <div class="marca">DigiArt <span>AR</span></div>
      <div class="subtitulo">Validação de Acesso</div>
      <p>Insira seu código de acesso para liberar a experiência.</p>
      <input type="text" id="tokenInput" class="input-token" placeholder="ex: s1234j" maxlength="10">
      <button class="btn" onclick="validarAcesso()">LIBERAR AGORA</button>
      <div id="status-msg"></div>
    </div>

    <div id="tela-tutorial" class="interface" style="display: none;">
      <div class="marca">DigiArt <span>AR</span></div>
      <div class="subtitulo">Homenagens Interativas</div>
      <p>Aponte a câmera para a imagem e toque abaixo para iniciar.</p>
      <button class="btn" onclick="iniciarMagia()">ATIVAR EXPERIÊNCIA ✨</button>
    </div>

    <div id="tela-expirado" class="interface" style="display: none;">
      <div class="marca">DigiArt <span>AR</span></div>
      <h2 style="margin-top: 0;">Jornada Finalizada</h2>
      <p>Seu ciclo chegou ao fim. Que tal renovar sua dose de carinho?</p>
      <a href="https://wa.me/5524981035118" class="btn" style="text-decoration:none">RENOVAR AGORA</a>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: no;" vr-mode-ui="enabled: false">
      <a-assets id="assets-folder"></a-assets>
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0">
        <a-video id="video-screen" position="0 0 0" width="1" height="1.77" scale="1.1 1.1 1.1"></a-video>
      </a-entity>
    </a-scene>

    <script>
      // CONFIGURAÇÕES DO PROJETO
      const TOTAL_VIDEOS_NA_PASTA = 26; 
      const VALIDADE_DIAS = 365; 

      const firebaseConfig = {
        apiKey: "AIzaSyDG-0ErUD35BZTHb9RZ21fFnXcMkX-IlZY",
        authDomain: "digiart-ar-sistema.firebaseapp.com",
        databaseURL: "https://digiart-ar-sistema-default-rtdb.firebaseio.com",
        projectId: "digiart-ar-sistema",
        storageBucket: "digiart-ar-sistema.firebasestorage.app",
        messagingSenderId: "497522538079",
        appId: "1:497522538079:web:6ee88681098324dc28cdea"
      };

      firebase.initializeApp(firebaseConfig);
      const database = firebase.database();

      function validarAcesso() {
        const token = document.getElementById('tokenInput').value.trim().toLowerCase();
        const msg = document.getElementById('status-msg');

        // --- MODO DESENVOLVEDOR (SUA CHAVE MESTRA ATUALIZADA) ---
        const CHAVE_MESTRA = "m2592sb"; 
        if (token === CHAVE_MESTRA) {
          msg.innerText = "🚀 Acesso Master Ativado!";
          msg.style.color = "#00ffaa";
          setTimeout(() => {
            document.getElementById('tela-bloqueio').style.display = 'none';
            document.getElementById('tela-tutorial').style.display = 'flex';
          }, 600);
          return;
        }

        if (token.length < 6) {
          msg.innerText = "❌ Código incompleto.";
          msg.style.color = "#ff8a80";
          return;
        }

        msg.innerText = "⏳ Verificando...";
        msg.style.color = "#fff";

        database.ref('/' + token).once('value').then((snapshot) => {
          if (snapshot.exists()) {
            const dados = snapshot.val();
            
            if (dados.status === "usado") {
              msg.innerText = "⚠️ Este código já foi utilizado.";
              msg.style.color = "#ffca28";
            } else {
              database.ref('/' + token).update({ status: "usado" }).then(() => {
                document.getElementById('tela-bloqueio').style.display = 'none';
                document.getElementById('tela-tutorial').style.display = 'flex';
                localStorage.setItem('digiart_acesso_validado', 'true');
              });
            }
          } else {
            msg.innerText = "❌ Código inválido.";
            msg.style.color = "#ff8a80";
          }
        }).catch((e) => {
          msg.innerText = "⚠️ Erro de conexão.";
        });
      }

      function iniciarMagia() {
        const docElm = document.documentElement;
        if (docElm.requestFullscreen) { docElm.requestFullscreen(); }
        else if (docElm.webkitRequestFullscreen) { docElm.webkitRequestFullscreen(); }

        const hoje = new Date();
        let dataInicio = localStorage.getItem('digiart_data_venda');

        if (!dataInicio) {
          dataInicio = hoje.getTime();
          localStorage.setItem('digiart_data_venda', dataInicio);
        }

        const milissegundosPorDia = 24 * 60 * 60 * 1000;
        const diasPassados = Math.ceil((hoje.getTime() - dataInicio) / milissegundosPorDia) || 1;

        if (diasPassados > VALIDADE_DIAS) {
          document.getElementById('tela-tutorial').style.display = 'none';
          document.getElementById('tela-expirado').style.display = 'flex';
          if (document.exitFullscreen) document.exitFullscreen();
          return;
        }

        let videoId = diasPassados % TOTAL_VIDEOS_NA_PASTA;
        if (videoId === 0) videoId = TOTAL_VIDEOS_NA_PASTA;

        document.getElementById('tela-tutorial').style.display = 'none';
        const sceneEl = document.querySelector('a-scene');
        sceneEl.systems["mindar-image-system"].start();
        configurarVideo(videoId + ".mp4");
      }

      function configurarVideo(src) {
        const assets = document.querySelector('#assets-folder');
        const v = document.createElement('video');
        v.id = 'vid'; v.src = src; v.loop = true; 
        v.setAttribute('crossorigin', 'anonymous');
        v.setAttribute('playsinline', 'true');
        v.setAttribute('webkit-playsinline', 'true');
        
        assets.appendChild(v);
        document.querySelector('#video-screen').setAttribute('src', '#vid');
        
        const scene = document.querySelector('a-scene');
        scene.addEventListener('targetFound', () => v.play());
        scene.addEventListener('targetLost', () => v.pause());
      }

      window.onload = () => {
        if (localStorage.getItem('digiart_acesso_validado') === 'true') {
          document.getElementById('tela-bloqueio').style.display = 'none';
          document.getElementById('tela-tutorial').style.display = 'flex';
        }
      };
    </script>
  </body>
</html>
