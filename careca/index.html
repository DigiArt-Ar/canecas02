<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      :root { --azul-digiart: #0047AB; --azul-claro: #00BFFF; --branco: #ffffff; }
      body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; width: 100vw; height: 100vh; }
      
      .interface {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; flex-direction: column; align-items: center;
        justify-content: center; z-index: 9999; text-align: center;
        padding: 20px; box-sizing: border-box; backdrop-filter: blur(15px);
        color: var(--branco); background: rgba(0, 71, 171, 0.85);
      }
      .marca { font-size: 42px; font-weight: bold; letter-spacing: 2px; }
      .marca span { color: var(--azul-claro); }
      .subtitulo { font-size: 14px; opacity: 0.9; margin-bottom: 30px; letter-spacing: 2px; }
      
      .btn-magia {
        padding: 18px 40px; border-radius: 50px; border: none;
        background: var(--branco); color: var(--azul-digiart);
        font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s;
        box-shadow: 0 10px 20px rgba(0,0,0,0.3);
      }

      #btn-contato {
        display: none; position: fixed; bottom: 40px; left: 50%;
        transform: translateX(-50%); z-index: 1000;
        padding: 15px 30px; background: #25D366; color: white;
        text-decoration: none; border-radius: 30px; font-weight: bold;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5); animation: pulse 2s infinite;
        white-space: nowrap; font-size: 16px; text-transform: uppercase;
      }
      @keyframes pulse { 0% {transform: translateX(-50%) scale(1);} 50% {transform: translateX(-50%) scale(1.05);} 100% {transform: translateX(-50%) scale(1);} }
      
      /* Força a ocultação de qualquer botão de VR residual */
      .a-enter-vr { display: none !important; }
    </style>
  </head>
  <body>

    <div id="tela-boas-vindas" class="interface">
      <div style="font-size: 60px; margin-bottom: 10px;">⚡</div>
      <div class="marca">DigiArt <span>AR</span></div>
      <div class="subtitulo">TECNOLOGIA E PERSONALIZAÇÃO</div>
      <p id="msg-status">Toque para iniciar a experiência interativa em tela cheia.</p>
      <button class="btn-magia" id="btn-start" onclick="verificarEntrarFullScreenEIniciar()">INICIAR MÁGICA ✨</button>
    </div>

    <a href="https://wa.me/5524981035118?text=Olá+DigiArt+AR!+Vi+a+sua+demonstração+e+quero+saber+mais+sobre+os+seus+personalizados!" id="btn-contato" target="_blank">
        QUERO UM PERSONALIZADO ASSIM! 🚀
    </a>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: yes;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false"
      embedded>
      
      <a-assets>
        <video id="vid1" src="1.mp4" loop="true" playsinline crossorigin="anonymous"></video>
      </a-assets>
      
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#vid1" position="0 0 0" width="1" height="1.77" scale="1.1 1.1 1.1"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const dataExpiracao = new Date(2026, 3, 30); 

      function verificarEntrarFullScreenEIniciar() {
        const hoje = new Date();
        if (hoje > dataExpiracao) {
          document.getElementById('msg-status').innerHTML = "⚠️ Esta promoção expirou.<br>Fale com a DigiArt AR para ver as novidades!";
          document.getElementById('btn-start').style.display = "none";
          return;
        }

        const docElm = document.documentElement;
        if (docElm.requestFullscreen) { docElm.requestFullscreen(); }
        else if (docElm.webkitRequestFullscreen) { docElm.webkitRequestFullscreen(); }

        document.getElementById('tela-boas-vindas').style.display = 'none';
        document.getElementById('btn-contato').style.display = 'block';
        
        // Garante que o sistema AR comece
        const sceneEl = document.querySelector('a-scene');
        sceneEl.systems["mindar-image-system"].start();
        
        const v1 = document.querySelector('#vid1');
        v1.volume = 1.0;
        const target = document.querySelector("a-entity[mindar-image-target]");
        target.addEventListener("targetFound", () => { v1.muted = false; v1.play(); });
        target.addEventListener("targetLost", () => v1.pause());
      }
    </script>
  </body>
</html>
