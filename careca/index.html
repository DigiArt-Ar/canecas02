<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      :root { --azul-digiart: #0047AB; --azul-claro: #00BFFF; --branco: #ffffff; }
      body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; width: 100vw; height: 100vh; }
      .interface {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; flex-direction: column; align-items: center;
        justify-content: center; z-index: 9999; text-align: center;
        padding: 20px; box-sizing: border-box; backdrop-filter: blur(15px);
        color: var(--branco); background: rgba(0, 71, 171, 0.85);
      }
      .marca { font-size: 42px; font-weight: bold; letter-spacing: 2px; }
      .marca span { color: var(--azul-claro); }
      .subtitulo { font-size: 14px; opacity: 0.9; margin-bottom: 30px; letter-spacing: 2px; text-transform: uppercase; }
      .btn-magia {
        padding: 18px 40px; border-radius: 50px; border: none;
        background: var(--branco); color: var(--azul-digiart);
        font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s;
        box-shadow: 0 10px 20px rgba(0,0,0,0.3);
      }
      #btn-contato {
        display: none; position: fixed; bottom: 40px; left: 50%;
        transform: translateX(-50%); z-index: 1000;
        padding: 15px 30px; background: #25D366; color: white;
        text-decoration: none; border-radius: 30px; font-weight: bold;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5); animation: pulse 2s infinite;
        white-space: nowrap; font-size: 16px; text-transform: uppercase;
      }
      @keyframes pulse { 0% {transform: translateX(-50%) scale(1);} 50% {transform: translateX(-50%) scale(1.05);} 100% {transform: translateX(-50%) scale(1);} }
      .a-enter-vr, .a-enter-ar, .a-orientation-modal, .mindar-ui-overlay { display: none !important; }
    </style>
  </head>
  <body>

    <div id="tela-boas-vindas" class="interface">
      <div style="font-size: 60px; margin-bottom: 10px;">⚡</div>
      <div class="marca">DigiArt <span>AR</span></div>
      <div class="subtitulo">Tecnologia e Personalização</div>
      <p id="texto-aviso">Toque para iniciar a experiência interativa.</p>
      <button class="btn-magia" id="btn-start" onclick="iniciarExperiencia()">INICIAR MÁGICA ✨</button>
    </div>

    <a href="https://wa.me/5524981035118" id="btn-contato" target="_blank">
        QUERO UM PERSONALIZADO ASSIM! 🚀
    </a>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: no;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false" 
      embedded>
      
      <a-assets>
        <video id="vid1" src="1.mp4" loop="true" playsinline crossorigin="anonymous" muted></video>
      </a-assets>
      
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      
      <a-entity mindar-image-target="targetIndex: 0" id="meuTarget">
        <a-video id="objVideo" src="#vid1" position="0 0 0" width="1" height="1"></a-video>
      </a-entity>
    </a-scene>

    <script>
      // ==========================================
      // CONFIGURAÇÃO DA DATA DE EXPIRAÇÃO
      // Formato: ANO-MES-DIA (Mantenha os hífens)
      const dataLimite = "2026-05-30"; 
      // ==========================================

      const v1 = document.querySelector('#vid1');
      const objVideo = document.querySelector('#objVideo');
      const btnStart = document.getElementById('btn-start');
      const textoAviso = document.getElementById('texto-aviso');

      // VERIFICAÇÃO DE DATA AO CARREGAR O SITE
      window.onload = function() {
          const hoje = new Date();
          const limite = new Date(dataLimite + "T23:59:59"); // Garante que vale até o fim do dia

          if (hoje > limite) {
              btnStart.style.display = "none";
              textoAviso.innerHTML = "<b style='color:#ffca28'>ESTE LINK EXPIROU!</b><br>Essa promoção não está mais ativa.";
          }
      };

      // AJUSTE DE PROPORÇÃO AUTOMÁTICO
      v1.addEventListener('loadedmetadata', function() {
          const ratio = v1.videoHeight / v1.videoWidth;
          objVideo.setAttribute('height', ratio);
      });

      function iniciarExperiencia() {
        const el = document.documentElement;
        if (el.requestFullscreen) el.requestFullscreen();

        document.getElementById('tela-boas-vindas').style.display = 'none';
        document.getElementById('btn-contato').style.display = 'block';
        
        const sceneEl = document.querySelector('a-scene');
        sceneEl.systems["mindar-image-system"].start();
        
        const target = document.querySelector("#meuTarget");
        target.addEventListener("targetFound", () => { v1.muted = false; v1.play(); });
        target.addEventListener("targetLost", () => { v1.pause(); });
      }
    </script>
  </body>
</html>
