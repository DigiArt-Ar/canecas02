<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Laboratório DigiArt - Face Detect</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; background: #222; color: white; font-family: Arial; }
        video { border-radius: 10px; margin-top: 20px; width: 90%; max-width: 600px; }
        canvas { position: absolute; top: 20px; }
        .status { margin-top: 10px; padding: 10px; color: #0f0; }
    </style>
</head>
<body>
    <h2>DigiArt - Sistema de Reconhecimento</h2>
    <div id="status" class="status">Carregando Inteligência Artificial...</div>
    <video id="video" autoplay muted playsinline></video>

    <script>
        const video = document.getElementById('video');
        const status = document.getElementById('status');

        // Carregar os modelos da IA direto da internet
        async function setup() {
            const MODEL_URL = 'https://raw.githubusercontent.com/vladmandic/face-api/master/model/';
            await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
            
            status.innerText = "IA Pronta! Ativando câmera...";
            
            navigator.mediaDevices.getUserMedia({ video: {} })
                .then(stream => {
                    video.srcObject = stream;
                    status.innerText = "Sistema Online - Detectando...";
                });
        }

        video.addEventListener('play', () => {
            const canvas = faceapi.createCanvasFromMedia(video);
            document.body.append(canvas);
            const displaySize = { width: video.clientWidth, height: video.clientHeight };
            faceapi.matchDimensions(canvas, displaySize);

            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks();
                const resizedDetections = faceapi.resizeResults(detections, displaySize);
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
                faceapi.draw.drawDetections(canvas, resizedDetections);
                faceapi.draw.drawFaceLandmarks(canvas, resizedDetections);
            }, 100);
        });

        setup();
    </script>
</body>
</html>
