<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela Interativa - Copa do Mundo 2026</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f1115">

    <style>
        :root {
            --bg-principal: #0f1115;
            --bg-card: #161920;
            --bg-input: #1e222b;
            --cor-borda: #2a2f3b;
            --amarelo-destaque: #eff2f7;
            --laranja-copa: #ff6b00;
            --verde-sucesso: #00e676;
            --texto-claro: #f1f3f5;
            --texto-escuro: #9ea7b3;
            --trava-vermelha: #ff3838;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-claro);
            padding: 15px;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--cor-borda);
        }

        header h1 {
            font-size: 1.5rem;
            color: var(--laranja-copa);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        header p {
            font-size: 0.85rem;
            color: var(--texto-escuro);
            margin-top: 5px;
        }

        .secao-titulo {
            text-align: center;
            font-size: 1.3rem;
            color: var(--laranja-copa);
            text-transform: uppercase;
            margin: 30px 0 20px 0;
            padding: 10px;
            background-color: rgba(255, 107, 0, 0.05);
            border-radius: 6px;
            border: 1px solid rgba(255, 107, 0, 0.15);
            letter-spacing: 1px;
        }

        .container-grupos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card-grupo {
            background-color: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--cor-borda);
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .titulo-grupo {
            font-size: 1.1rem;
            color: var(--laranja-copa);
            font-weight: bold;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 2px solid var(--laranja-copa);
            text-transform: uppercase;
        }

        .tabela-classificacao {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
            font-size: 0.82rem;
            text-align: center;
        }

        .tabela-classificacao th {
            color: var(--texto-escuro);
            padding: 6px 2px;
            font-weight: 600;
            border-bottom: 1px solid var(--cor-borda);
        }

        .tabela-classificacao td {
            padding: 8px 2px;
            border-bottom: 1px solid rgba(42, 47, 59, 0.4);
        }

        .align-left {
            text-align: left;
            font-weight: bold;
            color: var(--amarelo-destaque);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 110px;
        }

        .col-ponto {
            font-weight: bold;
            color: var(--verde-sucesso);
        }

        .bloco-jogos {
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-top: 1px dashed var(--cor-borda);
            padding-top: 12px;
        }

        .linha-confronto {
            display: flex;
            align-items: center;
            background-color: rgba(30, 34, 43, 0.4);
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 0.82rem;
            gap: 6px;
        }

        .info-data-hora {
            color: var(--texto-escuro);
            font-size: 0.75rem;
            font-weight: 500;
            min-width: 85px;
            white-space: nowrap;
        }

        .time-confronto {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 600;
        }

        /* Estilo comum para as bandeirinhas redondas nas tabelas */
        .bandeirinha {
            display: inline-block;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 4px rgba(0,0,0,0.4);
            flex-shrink: 0;
        }

        .time-confronto input {
            width: 100%;
            background: none;
            border: none;
            border-bottom: 1px dashed var(--texto-escuro);
            color: white;
            font-size: 0.85rem;
            font-weight: bold;
            padding: 2px 0;
        }

        .time-confronto input:focus {
            outline: none;
            border-bottom-color: var(--laranja-copa);
        }

        .time-confronto input:disabled {
            border-bottom: none;
            color: var(--amarelo-destaque);
        }

        .time-direita {
            flex-direction: row-reverse;
            text-align: right;
        }
        
        .time-direita input {
            text-align: right;
        }

        .area-placar {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .input-placar {
            width: 30px;
            height: 26px;
            background-color: var(--bg-input);
            border: 1px solid var(--cor-borda);
            color: white;
            text-align: center;
            font-weight: bold;
            font-size: 0.9rem;
            border-radius: 4px;
            -moz-appearance: textfield;
        }

        .input-placar::-webkit-outer-spin-button,
        .input-placar::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .input-placar:focus {
            border-color: var(--laranja-copa);
            outline: none;
        }

        .input-placar:disabled {
            background-color: rgba(10, 12, 16, 0.6);
            color: var(--texto-escuro);
            border-color: transparent;
            cursor: not-allowed;
        }

        .vs-separador {
            color: var(--texto-escuro);
            font-size: 0.7rem;
        }

        .btn-trava {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--texto-escuro);
            font-size: 0.95rem;
            padding: 2px 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s, transform 0.1s;
        }

        .btn-trava:hover {
            color: var(--verde-sucesso);
            transform: scale(1.1);
        }

        .btn-trava.bloqueado {
            color: var(--trava-vermelha);
        }

        .container-matamata {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto 30px auto;
        }

        .card-fase-mata {
            background-color: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--cor-borda);
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .container-campeao {
            max-width: 500px;
            margin: 0 auto 60px auto;
            background: linear-gradient(135deg, #1e222b 0%, #161920 100%);
            border: 2px solid var(--laranja-copa);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 107, 0, 0.2);
        }

        .titulo-campeao {
            font-size: 1.4rem;
            color: #ffd700;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .box-nome-campeao {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background-color: var(--bg-principal);
            border: 1px dashed #ffd700;
            color: #ffd700;
            font-size: 1.3rem;
            font-weight: bold;
            padding: 12px;
            border-radius: 8px;
            text-transform: uppercase;
        }
    </style>
</head>

            try {

                if (memoriaGrupos) databaseGrupos = JSON.parse(memoriaGrupos);
                if (memoriaMata) databaseMataMata = JSON.parse(memoriaMata);
            } catch (e) { console.error(e); }
        }

        function salvarDados() {

                return;
            }

            jogo.travado = true;
            salvarDados();
            atualizarInputsGrupoInterface(grupoId, jogoIdx, true);
            processarGrupo(grupoId);
            calcularPassagemAutomaticaFaseGrupos();
        }

        function atualizarInputsGrupoInterface(grupoId, jogoIdx, travado) {
            const inp1 = document.getElementById(`input-${grupoId}-${jogoIdx}-1`);
            const inp2 = document.getElementById(`input-${grupoId}-${jogoIdx}-2`);
            const btn = document.getElementById(`btn-${grupoId}-${jogoIdx}`);
            if (inp1) inp1.disabled = travado;
            if (inp2) inp2.disabled = travado;
            if (btn) {
                btn.className = `btn-trava ${travado ? 'bloqueado' : ''}`;
                btn.innerHTML = travado ? "🔒" : "🔓";
            }
        }

        function alterarPlacarGrupo(grupoId, jogoIdx, campo, valor) {
            const chave = `${grupoId}_${jogoIdx}`;
            if (!databaseGrupos[chave]) databaseGrupos[chave] = { p1: "", p2: "", travado: false };
            if (databaseGrupos[chave].travado) return;

            databaseGrupos[chave][campo] = valor !== "" ? parseInt(valor) : "";
            salvarDados();
            processarGrupo(grupoId);
        }

        function processarGrupo(grupoId) {
            const dadosGrupo = estruturaCopa[grupoId];
            let stats = {};

            dadosGrupo.times.forEach(t => {
                stats[t] = { pts: 0, v: 0, e: 0, d: 0, gp: 0, gc: 0, sg: 0 };
            });

            dadosGrupo.jogos.forEach((j, idx) => {
                const chave = `${grupoId}_${idx}`;
                const jogo = databaseGrupos[chave];

                if (jogo && jogo.travado && jogo.p1 !== "" && jogo.p2 !== "") {
                    const g1 = PatternPlacar(jogo.p1); const g2 = PatternPlacar(jogo.p2);
                    stats[j.t1].gp += g1; stats[j.t1].gc += g2;
                    stats[j.t2].gp += g2; stats[j.t2].gc += g1;

                    if (g1 > g2) {
                        stats[j.t1].pts += 3; stats[j.t1].v += 1; stats[j.t2].d += 1;
                    } else if (g1 < g2) {
                        stats[j.t2].pts += 3; stats[j.t2].v += 1; stats[j.t1].d += 1;
                    } else {
                        stats[j.t1].pts += 1; stats[j.t1].e += 1;
                        stats[j.t2].pts += 1; stats[j.t2].e += 1;
                    }
                }
            });

            dadosGrupo.times.forEach(t => stats[t].sg = stats[t].gp - stats[t].gc);

            let ranking = [...dadosGrupo.times];
            ranking.sort((a, b) => {
                if (stats[b].pts !== stats[a].pts) return stats[b].pts - stats[a].pts;
                if (stats[b].sg !== stats[a].sg) return stats[b].sg - stats[a].sg;
                return stats[b].gp - stats[a].gp;
            });

            classificadosGruposGlobal[grupoId] = { primeiro: ranking[0], segundo: ranking[1] };

            const tbody = document.getElementById(`tbody-${grupoId}`);
            if (!tbody) return;
            tbody.innerHTML = "";

            ranking.forEach((time, pos) => {
                const s = stats[time];
                const tr = document.createElement('tr');
                const nomeExibicao = obterNomeCompleto(time);

                // O TOPO MANTÉM OS NOMES LIMPOS (SEM BANDEIRA) DO JEITO QUE VOCÊ PEDIU
                tr.innerHTML = `
                    <td>${pos + 1}º</td>
                    <td class="align-left" title="${nomeExibicao}">${nomeExibicao}</td>
                    <td class="col-ponto">${s.pts}</td>
                    <td>${s.v}</td>
                    <td>${s.e}</td>
                    <td>${s.gp}</td>
                    <td>${s.sg}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function PatternPlacar(v) { return v === "" || isNaN(v) ? 0 : parseInt(v); }

        function calcularPassagemAutomaticaFaseGrupos() {
            Object.keys(mapaAutoMata).forEach(idJogo => {
                const regra = mapaAutoMata[idJogo];
                if (!databaseMataMata[idJogo]) databaseMataMata[idJogo] = { t1: "", t2: "", p1: "", p2: "", travado: false };
                
                if (!databaseMataMata[idJogo].travado) {
                    if (regra.t1.includes("1º") || regra.t1.includes("2º")) {
                        const g = regra.t1.split(" ")[1];
                        const pos = regra.t1.split(" ")[0];
                        let grupoPronto = true;
                        for(let i=0; i<6; i++) {
                            if(!databaseGrupos[`${g}_${i}`]?.travado) { grupoPronto = false; break; }
                        }
                        if (grupoPronto && classificadosGruposGlobal[g]) {
                            const siglaTime = pos === "1º" ? classificadosGruposGlobal[g].primeiro : classificadosGruposGlobal[g].segundo;
                            databaseMataMata[idJogo].t1 = obterNomeCompleto(siglaTime);
                            // Atualiza dinamicamente a bandeira no input do Mata-Mata se for preenchido automaticamente
                            const bandEl = document.getElementById(`band-m-t1-${idJogo}`);
                            if (bandEl) bandEl.className = `bandeirinha ${pegarClasseBandeira(siglaTime)}`;
                        } else { 
                            databaseMataMata[idJogo].t1 = ""; 
                            const bandEl = document.getElementById(`band-m-t1-${idJogo}`);
                            if (bandEl) bandEl.className = "bandeirinha";
                        }
                        const el = document.getElementById(`m-t1-${idJogo}`); if(el) el.value = databaseMataMata[idJogo].t1;
                    }
                    
                    if (regra.t2.includes("1º") || regra.t2.includes("2º")) {
                        const g = regra.t2.split(" ")[1];
                        const pos = regra.t2.split(" ")[0];
                        let grupoPronto = true;
                        for(let i=0; i<6; i++) {
                            if(!databaseGrupos[`${g}_${i}`]?.travado) { grupoPronto = false; break; }
                        }
                        if (grupoPronto && classificadosGruposGlobal[g]) {
                            const siglaTime = pos === "1º" ? classificadosGruposGlobal[g].primeiro : classificadosGruposGlobal[g].segundo;
                            databaseMataMata[idJogo].t2 = obterNomeCompleto(siglaTime);
                            // Atualiza dinamicamente a bandeira no input do Mata-Mata se for preenchido automaticamente
                            const bandEl = document.getElementById(`band-m-t2-${idJogo}`);
                            if (bandEl) bandEl.className = `bandeirinha ${pegarClasseBandeira(siglaTime)}`;
                        } else { 
                            databaseMataMata[idJogo].t2 = ""; 
                            const bandEl = document.getElementById(`band-m-t2-${idJogo}`);
                            if (bandEl) bandEl.className = "bandeirinha";
                        }
                        const el = document.getElementById(`m-t2-${idJogo}`); if(el) el.value = databaseMataMata[idJogo].t2;
                    }
                }
            });
            salvarDados();
        }

        function alterarTextoMata(jogoId, campo, valor) {
            if (!databaseMataMata[jogoId]) databaseMataMata[jogoId] = { t1:"", t2:"", p1:"", p2:"", travado: false };
            if (databaseMataMata[jogoId].travado) return;
            databaseMataMata[jogoId][campo] = valor;

            // Tenta achar a sigla digitada para colocar a bandeira em tempo real no mata-mata manual
            let siglaEncontrada = "";
            for (let [sigla, nome] of Object.entries(nomesCompletosSelecoes)) {
                if (nome.toLowerCase() === valor.toLowerCase() || sigla.toLowerCase() === valor.toLowerCase()) {
                    siglaEncontrada = sigla;
                    break;
                }
            }
            const sufixoTime = campo === "t1" ? "t1" : "t2";
            const bandEl = document.getElementById(`band-m-${sufixoTime}-${jogoId}`);
            if (bandEl) bandEl.className = siglaEncontrada ? `bandeirinha ${pegarClasseBandeira(siglaEncontrada)}` : "bandeirinha";

            salvarDados();
        }

        function alterarPlacarMata(jogoId, campo, valor) {
            if (!databaseMataMata[jogoId]) databaseMataMata[jogoId] = { t1:"", t2:"", p1:"", p2:"", travado: false };
            if (databaseMataMata[jogoId].travado) return;
            databaseMataMata[jogoId][campo] = valor !== "" ? parseInt(valor) : "";
            salvarDados();
        }

        function toggleTravaMata(jogoId) {
            if (!databaseMataMata[jogoId]) databaseMataMata[jogoId] = { t1:"", t2:"", p1:"", p2:"", travado: false };
            const jogo = databaseMataMata[jogoId];

            if (jogo.travado) {
                jogo.travado = false;
                salvarDados();
                atualizarInputsMataInterface(jogoId, false);
                if (jogoId === "p104") atualizarPainelCampeao("");
                return;
            }

            if (jogo.t1 === "" || jogo.t2 === "" || jogo.p1 === "" || jogo.p2 === "") {
                alert("Preencha as equipes e os placares do mata-mata antes de travar.");
                return;
            }

            jogo.travado = true;
            salvarDados();
            atualizarInputsMataInterface(jogoId, true);
            calcularVencedorMataEAvancar(jogoId);
        }

        function atualizarInputsMataInterface(jogoId, travado) {
            const inTime1 = document.getElementById(`m-t1-${jogoId}`);
            const inTime2 = document.getElementById(`m-t2-${jogoId}`);
            const inPlac1 = document.getElementById(`m-p1-${jogoId}`);
            const inPlac2 = document.getElementById(`m-p2-${jogoId}`);
            const btn = document.getElementById(`btn-m-${jogoId}`);

            if(inTime1) inTime1.disabled = travado; 
            if(inTime2) inTime2.disabled = travado;
            if(inPlac1) inPlac1.disabled = travado; 
            if(inPlac2) inPlac2.disabled = travado;
            if(btn) {
                btn.className = `btn-trava ${travado ? 'bloqueado' : ''}`;
                btn.innerHTML = travado ? "🔒" : "🔓";
            }
        }

        function calcularVencedorMataEAvancar(jogoId) {
            const jogo = databaseMataMata[jogoId];
            if (!jogo || !jogo.travado) return;

            let vencedor = "";
            let perdedor = "";

            if (jogo.p1 > jogo.p2) {
                vencedor = jogo.t1; perdedor = jogo.t2;
            } else if (jogo.p2 > jogo.p1) {
                vencedor = jogo.t2; perdedor = jogo.t1;
            } else {
                let escolha = prompt(`Empate!\nDigite 1 para: ${jogo.t1}\nDigite 2 para: ${jogo.t2}`);
                if(escolha === "2") { vencedor = jogo.t2; perdedor = jogo.t1; } 
                else { vencedor = jogo.t1; perdedor = jogo.t2; }
            }

            if (jogoId === "p104") {
                atualizarPainelCampeao(vencedor);
                return;
            }

            Object.keys(estruturaMataMata).forEach(fase => {
                estruturaMataMata[fase].forEach(confronto => {
                    if (confronto.orig) {
                        const targetTipo = confronto.tipo || "vencedores";

                        if (confronto.orig[0] === widgetAlvo = jogoId) {
                            if (!databaseMataMata[confronto.id]) databaseMataMata[confronto.id] = { t1:"", t2:"", p1:"", p2:"", travado:false };
                            if (!databaseMataMata[confronto.id].travado) {
                                const herdeiro = (targetTipo === "perdedores") ? perdedor : vencedor;
                                databaseMataMata[confronto.id].t1 = herdeiro;
                                const el = document.getElementById(`m-t1-${confronto.id}`); if(el) el.value = herdeiro;
                                
                                // Aplica a bandeira dinamicamente na passagem do Mata-Mata
                                let siglaH = ""; for(let [s,n] of Object.entries(nomesCompletosSelecoes)){if(n===herdeiro)siglaH=s;}
                                const bandEl = document.getElementById(`band-m-t1-${confronto.id}`);
                                if(bandEl) bandEl.className = siglaH ? `bandeirinha ${pegarClasseBandeira(siglaH)}` : "bandeirinha";
                            }
                        } else if (confronto.orig[1] === jogoId) {
                            if (!databaseMataMata[confronto.id]) databaseMataMata[confronto.id] = { t1:"", t2:"", p1:"", p2:"", travado:false };
                            if (!databaseMataMata[confronto.id].travado) {
                                const herdeiro = (targetTipo === "perdedores") ? perdedor : vencedor;
                                databaseMataMata[confronto.id].t2 = herdeiro;
                                const el = document.getElementById(`m-t2-${confronto.id}`); if(el) el.value = herdeiro;
                                
                                // Aplica a bandeira dinamicamente na passagem do Mata-Mata
                                let siglaH = ""; for(let [s,n] of Object.entries(nomesCompletosSelecoes)){if(n===herdeiro)siglaH=s;}
                                const bandEl = document.getElementById(`band-m-t2-${confronto.id}`);
                                if(bandEl) bandEl.className = siglaH ? `bandeirinha ${pegarClasseBandeira(siglaH)}` : "bandeirinha";
                            }
                        }
                    }
                });
            });
            salvarDados();
        }

        function atualizarPainelCampeao(nome) {
            const el = document.getElementById("nome-do-campeao");
            if(!el) return;
            
            if(nome) {
                let siglaC = ""; for(let [s,n] of Object.entries(nomesCompletosSelecoes)){if(n===nome)siglaC=s;}
                const bClass = pegarClasseBandeira(siglaC);
                el.innerHTML = `<span class="bandeirinha ${bClass}"></span> 🏆 ${nome} 🏆 <span class="bandeirinha ${bClass}"></span>`;
            } else {
                el.innerText = "Aguardando a Final...";
            }
        }

        function renderizarGrupos() {
            const wrapper = document.getElementById('wrapper-fase-grupos');
            if(!wrapper) return;
            wrapper.innerHTML = "";

            Object.keys(estruturaCopa).forEach(grupoId => {
                const dadosGrupo = estruturaCopa[grupoId];
                const card = document.createElement('div');
                card.className = 'card-grupo';
                
                let blocoJogosHtml = '';
                dadosGrupo.jogos.forEach((j, idx) => {
                    const chave = `${grupoId}_${idx}`;
                    const val1 = databaseGrupos[chave]?.p1 ?? "";
                    const val2 = databaseGrupos[chave]?.p2 ?? "";
                    const travado = databaseGrupos[chave]?.travado ?? false;

                    // AS BANDEIRAS ENTRAM EXCLUSIVAMENTE AQUI NAS LINHAS DE CONFRONTO
                    blocoJogosHtml += `
                        <div class="linha-confronto">
                            <span class="info-data-hora">${j.d}</span>
                            <span class="time-confronto" title="${obterNomeCompleto(j.t1)}">
                                <span class="bandeirinha ${pegarClasseBandeira(j.t1)}"></span>
                                ${obterNomeCompleto(j.t1)}
                            </span>
                            <div class="area-placar">
                                <input type="number" id="input-${grupoId}-${idx}-1" class="input-placar" value="${val1}" ${travado ? 'disabled' : ''} oninput="alterarPlacarGrupo('${grupoId}', ${idx}, 'p1', this.value)">
                                <span class="vs-separador">x</span>
                                <input type="number" id="input-${grupoId}-${idx}-2" class="input-placar" value="${val2}" ${travado ? 'disabled' : ''} oninput="alterarPlacarGrupo('${grupoId}', ${idx}, 'p2', this.value)">
                            </div>
                            <span class="time-confronto time-direita" title="${obterNomeCompleto(j.t2)}">
                                <span class="bandeirinha ${pegarClasseBandeira(j.t2)}"></span>
                                ${obterNomeCompleto(j.t2)}
                            </span>
                            <button id="btn-${grupoId}-${idx}" class="btn-trava ${travado ? 'bloqueado' : ''}" onclick="toggleTravaGrupo('${grupoId}', ${idx})">
                                ${travado ? '🔒' : '🔓'}
                            </button>
                        </div>
                    `;
                });

                card.innerHTML = `
                    <div class="titulo-grupo">Grupo ${grupoId}</div>
                    <table class="tabela-classificacao">
                        <thead>
                            <tr>
                                <th>Pos</th>
                                <th style="text-align:left">Seleção</th>
                                <th>P</th>
                                <th>V</th>
                                <th>E</th>
                                <th>GP</th>
                                <th>SG</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-${grupoId}"></tbody>
                    </table>
                    <div class="bloco-jogos">${blocoJogosHtml}</div>
                `;
                wrapper.appendChild(card);
                processarGrupo(grupoId);
            });
        }

        function renderizarMataMata() {
            const wrapper = document.getElementById('wrapper-mata-mata');
            if(!wrapper) return;
            wrapper.innerHTML = "";

            Object.keys(estruturaMataMata).forEach(faseNome => {
                const cardFase = document.createElement('div');
                cardFase.className = 'card-fase-mata';
                
                let htmlTituloFase = `<div class="titulo-grupo">${faseNome}</div>`;
                let htmlConfrontos = '';

                estruturaMataMata[faseNome].forEach(c => {
                    const dadosSalvos = databaseMataMata[c.id] || { t1:"", t2:"", p1:"", p2:"", travado:false };
                    const travado = dadosSalvos.travado;

                    let s1 = ""; let s2 = "";
                    for(let [s,n] of Object.entries(nomesCompletosSelecoes)){if(n===dadosSalvos.t1)s1=s; if(n===dadosSalvos.t2)s2=s;}

                    htmlConfrontos += `
                        <div class="linha-confronto">
                            <span class="info-data-hora">${c.d}</span>
                            <span class="time-confronto">
                                <span id="band-m-t1-${c.id}" class="bandeirinha ${pegarClasseBandeira(s1)}"></span>
                                <input type="text" id="m-t1-${c.id}" value="${dadosSalvos.t1}" placeholder="Equipe A" ${travado ? 'disabled' : ''} onchange="alterarTextoMata('${c.id}', 't1', this.value)">
                            </span>
                            <div class="area-placar">
                                <input type="number" id="m-p1-${c.id}" class="input-placar" value="${dadosSalvos.p1 ?? ""}" ${travado ? 'disabled' : ''} oninput="alterarPlacarMata('${c.id}', 'p1', this.value)">
                                <span class="vs-separador">x</span>
                                <input type="number" id="m-p2-${c.id}" class="input-placar" value="${dadosSalvos.p2 ?? ""}" ${travado ? 'disabled' : ''} oninput="alterarPlacarMata('${c.id}', 'p2', this.value)">
                            </div>
                            <span class="time-confronto time-direita">
                                <span id="band-m-t2-${c.id}" class="bandeirinha ${pegarClasseBandeira(s2)}"></span>
                                <input type="text" id="m-t2-${c.id}" value="${dadosSalvos.t2}" placeholder="Equipe B" ${travado ? 'disabled' : ''} onchange="alterarTextoMata('${c.id}', 't2', this.value)">
                            </span>
                            <button id="btn-m-${c.id}" class="btn-trava ${travado ? 'bloqueado' : ''}" onclick="toggleTravaMata('${c.id}')">
                                ${travado ? '🔒' : '🔓'}
                            </button>
                        </div>
                    `;
                });

                cardFase.innerHTML = htmlTituloFase + htmlConfrontos;
                wrapper.appendChild(cardFase);

                // Aplica travas visuais salvas no carregamento inicial do mata-mata
                estruturaMataMata[faseNome].forEach(c => {
                    const dadosSalvos = databaseMataMata[c.id];
                    if (dadosSalvos && dadosSalvos.travado) {
                        atualizarInputsMataInterface(c.id, true);
                        if (c.id === "p104") atualizarPainelCampeao(dadosSalvos.p1 > dadosSalvos.p2 ? dadosSalvos.t1 : dadosSalvos.t2);
                    }
                });
            });
        }

        // INICIALIZAÇÃO DO APP
        carregarDados();
        renderizarGrupos();
        calcularPassagemAutomaticaFaseGrupos();
        renderizarMataMata();
    </script>
</body>
</html>
