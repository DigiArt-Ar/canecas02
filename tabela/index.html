<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela Interativa - Copa do Mundo 2026</title>
    <style>
        :root {
            --bg-principal: #0f1115;
            --bg-card: #161920;
            --bg-input: #1e222b;
            --cor-borda: #2a2f3b;
            --amarelo-destaque: #eff2f7;
            --laranja-copa: #ff6b00;
            --verde-sucesso: #00e676;
            --texto-claro: #f1f3f5;
            --texto-escuro: #9ea7b3;
            --trava-vermelha: #ff3838;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-claro);
            padding: 15px;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--cor-borda);
        }

        header h1 {
            font-size: 1.5rem;
            color: var(--laranja-copa);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        header p {
            font-size: 0.85rem;
            color: var(--texto-escuro);
            margin-top: 5px;
        }

        .secao-titulo {
            text-align: center;
            font-size: 1.3rem;
            color: var(--laranja-copa);
            text-transform: uppercase;
            margin: 30px 0 20px 0;
            padding: 10px;
            background-color: rgba(255, 107, 0, 0.05);
            border-radius: 6px;
            border: 1px solid rgba(255, 107, 0, 0.15);
            letter-spacing: 1px;
        }

        .container-grupos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card-grupo {
            background-color: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--cor-borda);
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .titulo-grupo {
            font-size: 1.1rem;
            color: var(--laranja-copa);
            font-weight: bold;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 2px solid var(--laranja-copa);
            text-transform: uppercase;
        }

        .tabela-classificacao {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
            font-size: 0.82rem;
            text-align: center;
        }

        .tabela-classificacao th {
            color: var(--texto-escuro);
            padding: 6px 4px;
            font-weight: 600;
            border-bottom: 1px solid var(--cor-borda);
        }

        .tabela-classificacao td {
            padding: 8px 4px;
            border-bottom: 1px solid rgba(42, 47, 59, 0.4);
        }

        .align-left {
            text-align: left;
            font-weight: bold;
            color: var(--amarelo-destaque);
        }

        .col-ponto {
            font-weight: bold;
            color: var(--verde-sucesso);
        }

        .bloco-jogos {
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-top: 1px dashed var(--cor-borda);
            padding-top: 12px;
        }

        .linha-confronto {
            display: flex;
            align-items: center;
            background-color: rgba(30, 34, 43, 0.4);
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 0.82rem;
            gap: 6px;
        }

        .info-data-hora {
            color: var(--texto-escuro);
            font-size: 0.75rem;
            font-weight: 500;
            min-width: 78px;
            white-space: nowrap;
        }

        .time-confronto {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 600;
        }

        .time-confronto input {
            width: 100%;
            background: none;
            border: none;
            border-bottom: 1px dashed var(--texto-escuro);
            color: white;
            font-size: 0.85rem;
            font-weight: bold;
            padding: 2px 0;
        }

        .time-confronto input:focus {
            outline: none;
            border-bottom-color: var(--laranja-copa);
        }

        .time-confronto input:disabled {
            border-bottom: none;
            color: var(--amarelo-destaque);
        }

        .time-direita {
            text-align: right;
        }
        
        .time-direita input {
            text-align: right;
        }

        .area-placar {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .input-placar {
            width: 30px;
            height: 26px;
            background-color: var(--bg-input);
            border: 1px solid var(--cor-borda);
            color: white;
            text-align: center;
            font-weight: bold;
            font-size: 0.9rem;
            border-radius: 4px;
            -moz-appearance: textfield;
        }

        .input-placar::-webkit-outer-spin-button,
        .input-placar::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .input-placar:focus {
            border-color: var(--laranja-copa);
            outline: none;
        }

        .input-placar:disabled {
            background-color: rgba(10, 12, 16, 0.6);
            color: var(--texto-escuro);
            border-color: transparent;
            cursor: not-allowed;
        }

        .vs-separador {
            color: var(--texto-escuro);
            font-size: 0.7rem;
        }

        .btn-trava {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--texto-escuro);
            font-size: 0.95rem;
            padding: 2px 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s, transform 0.1s;
        }

        .btn-trava:hover {
            color: var(--verde-sucesso);
            transform: scale(1.1);
        }

        .btn-trava.bloqueado {
            color: var(--trava-vermelha);
        }

        .container-matamata {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto 50px auto;
        }

        .card-fase-mata {
            background-color: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--cor-borda);
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Tabela Digital - Copa do Mundo 2026</h1>
        <p>Insira os placares e clique no ícone de cadeado no fim da linha para salvar e travar os resultados</p>
    </header>

    <!-- PRIMEIRA PARTE DA TABELA -->
    <div class="secao-titulo">🏆 Primeira Fase - Grupos</div>
    <div class="container-grupos" id="wrapper-fase-grupos"></div>

    <!-- SEGUNDA PARTE DA TABELA (MATA-MATA) -->
    <div class="secao-titulo">⚔️ Segunda Parte - Chaveamento Mata-Mata</div>
    <div class="container-matamata" id="wrapper-mata-mata"></div>

    <script>
        const estruturaCopa = {
            "A": { times: ["MEX", "AFS", "COR", "TCH"], jogos: [{t1:"MEX", t2:"AFS", d:"11/06 16:00"}, {t1:"COR", t2:"TCH", d:"11/06 23:00"}, {t1:"TCH", t2:"AFS", d:"18/06 13:00"}, {t1:"MEX", t2:"COR", d:"18/06 22:00"}, {t1:"AFS", t2:"COR", d:"24/06 22:00"}, {t1:"TCH", t2:"MEX", d:"24/06 22:00"}] },
            "B": { times: ["CAN", "BOS", "CAT", "SUI"], jogos: [{t1:"CAN", t2:"BOS", d:"12/06 16:00"}, {t1:"CAT", t2:"SUI", d:"13/06 16:00"}, {t1:"SUI", t2:"BOS", d:"18/06 19:00"}, {t1:"CAN", t2:"CAT", d:"18/06 19:00"}, {t1:"BOS", t2:"CAT", d:"24/06 16:00"}, {t1:"SUI", t2:"CAN", d:"24/06 16:00"}] },
            "C": { times: ["BRA", "MAR", "HAI", "SCO"], jogos: [{t1:"BRA", t2:"MAR", d:"13/06 19:00"}, {t1:"HAI", t2:"SCO", d:"14/06 22:00"}, {t1:"SCO", t2:"MAR", d:"19/06 19:00"}, {t1:"BRA", t2:"HAI", d:"19/06 21:30"}, {t1:"SCO", t2:"BRA", d:"24/06 19:00"}, {t1:"MAR", t2:"HAI", d:"24/06 19:00"}] },
            "D": { times: ["USA", "PAR", "AUS", "TUR"], jogos: [{t1:"USA", t2:"PAR", d:"12/06 22:00"}, {t1:"AUS", t2:"TUR", d:"14/06 01:00"}, {t1:"USA", t2:"AUS", d:"19/06 16:00"}, {t1:"TUR", t2:"PAR", d:"20/06 01:00"}, {t1:"PAR", t2:"AUS", d:"25/06 23:00"}, {t1:"TUR", t2:"USA", d:"25/06 23:00"}] },
            "E": { times: ["ALE", "CUR", "CDI", "EQU"], jogos: [{t1:"ALE", t2:"CUR", d:"14/06 14:00"}, {t1:"CDI", t2:"EQU", d:"14/06 20:00"}, {t1:"ALE", t2:"CDI", d:"20/06 17:00"}, {t1:"EQU", t2:"CUR", d:"20/06 21:00"}, {t1:"CUR", t2:"CDI", d:"25/06 17:00"}, {t1:"EQU", t2:"ALE", d:"25/06 17:00"}] },
            "F": { times: ["HOL", "JAP", "SUE", "TUN"], jogos: [{t1:"HOL", t2:"JAP", d:"14/06 17:00"}, {t1:"SUE", t2:"TUN", d:"14/06 23:00"}, {t1:"HOL", t2:"SUE", d:"20/06 14:00"}, {t1:"TUN", t2:"JAP", d:"21/06 01:00"}, {t1:"JAP", t2:"SUE", d:"25/06 20:00"}, {t1:"TUN", t2:"HOL", d:"25/06 20:00"}] },
            "G": { times: ["BEL", "EGT", "IRA", "NZE"], jogos: [{t1:"BEL", t2:"EGT", d:"15/06 16:00"}, {t1:"IRA", t2:"NZE", d:"15/06 22:00"}, {t1:"BEL", t2:"IRA", d:"21/06 16:00"}, {t1:"NZE", t2:"EGT", d:"21/06 22:00"}, {t1:"NZE", t2:"BEL", d:"27/06 00:00"}, {t1:"EGT", t2:"IRA", d:"27/06 00:00"}] },
            "H": { times: ["ESP", "CAB", "SAU", "URU"], jogos: [{t1:"ESP", t2:"CAB", d:"15/06 13:00"}, {t1:"SAU", t2:"URU", d:"15/06 19:00"}, {t1:"ESP", t2:"SAU", d:"21/06 12:00"}, {t1:"URU", t2:"CAB", d:"21/06 19:00"}, {t1:"CAB", t2:"SAU", d:"26/06 21:30"}, {t1:"URU", t2:"ESP", d:"26/06 21:30"}] },
            "I": { times: ["FRA", "SNG", "IRQ", "NOR"], jogos: [{t1:"FRA", t2:"SNG", d:"16/06 16:30"}, {t1:"IRQ", t2:"NOR", d:"16/06 19:30"}, {t1:"FRA", t2:"IRQ", d:"22/06 18:00"}, {t1:"NOR", t2:"SNG", d:"22/06 21:00"}, {t1:"NOR", t2:"IRQ", d:"26/06 16:30"}, {t1:"SNG", t2:"FRA", d:"26/06 16:30"}] },
            "J": { times: ["ARG", "AGL", "AST", "JRD"], jogos: [{t1:"ARG", t2:"AGL", d:"16/06 22:00"}, {t1:"AST", t2:"JRD", d:"17/06 01:00"}, {t1:"ARG", t2:"AST", d:"22/06 14:00"}, {t1:"JRD", t2:"AGL", d:"23/06 14:00"}, {t1:"AGL", t2:"AST", d:"27/06 23:00"}, {t1:"JRD", t2:"ARG", d:"27/06 23:00"}] },
            "K": { times: ["POR", "RDC", "UZB", "COL"], jogos: [{t1:"POR", t2:"RDC", d:"17/06 14:00"}, {t1:"UZB", t2:"COL", d:"17/06 22:00"}, {t1:"POR", t2:"UZB", d:"23/06 14:00"}, {t1:"COL", t2:"RDC", d:"23/06 14:00"}, {t1:"RDC", t2:"UZB", d:"27/06 20:30"}, {t1:"COL", t2:"POR", d:"27/06 20:30"}] },
            "L": { times: ["ING", "CRO", "GHA", "PAN"], jogos: [{t1:"ING", t2:"CRO", d:"17/06 17:00"}, {t1:"GHA", t2:"PAN", d:"17/06 20:00"}, {t1:"ING", t2:"GHA", d:"23/06 17:00"}, {t1:"PAN", t2:"CRO", d:"23/06 20:00"}, {t1:"CRO", t2:"GHA", d:"27/06 17:00"}, {t1:"PAN", t2:"ING", d:"27/06 17:00"}] }
        };

        const estruturaMataMata = {
            "Segundas de Final (1/16)": [{id:"sf1"}, {id:"sf2"}, {id:"sf3"}, {id:"sf4"}, {id:"sf5"}, {id:"sf6"}, {id:"sf7"}, {id:"sf8"}],
            "Oitavas de Final": [{id:"of1"}, {id:"of2"}, {id:"of3"}, {id:"of4"}],
            "Quartas de Final": [{id:"qf1"}, {id:"qf2"}],
            "Semifinal": [{id:"semi1"}, {id:"semi2"}],
            "Grande Final": [{id:"final1"}]
        };

        let databaseGrupos = {};
        let databaseMataMata = {};

        function carregarDados() {
            try {
                const memoriaGrupos = localStorage.getItem('copa_2026_grupos');
                const memoriaMata = localStorage.getItem('copa_2026_matamata');
                if (memoriaGrupos) databaseGrupos = JSON.parse(memoriaGrupos);
                if (memoriaMata) databaseMataMata = JSON.parse(memoriaMata);
            } catch (e) {
                console.error("Erro ao carregar dados", e);
            }
        }

        function salvarDados() {
            try {
                localStorage.setItem('copa_2026_grupos', JSON.stringify(databaseGrupos));
                localStorage.setItem('copa_2026_matamata', JSON.stringify(databaseMataMata));
            } catch (e) {
                console.error("Erro ao salvar dados", e);
            }
        }

        function toggleTravaGrupo(grupoId, jogoIdx) {
            const chave = `${grupoId}_${jogoIdx}`;
            if (!databaseGrupos[chave]) databaseGrupos[chave] = { p1: "", p2: "", travado: false };

            if (databaseGrupos[chave].p1 === "" || databaseGrupos[chave].p2 === "") {
                alert("Insira o placar antes de travar o confronto.");
                return;
            }

            databaseGrupos[chave].travado = !databaseGrupos[chave].travado;
            salvarDados();
            
            const inp1 = document.getElementById(`input-${grupoId}-${jogoIdx}-1`);
            const inp2 = document.getElementById(`input-${grupoId}-${jogoIdx}-2`);
            const btn = document.getElementById(`btn-${grupoId}-${jogoIdx}`);

            if (databaseGrupos[chave].travado) {
                if(inp1) inp1.disabled = true; 
                if(inp2) inp2.disabled = true;
                if(btn) { btn.classList.add('bloqueado'); btn.innerHTML = "🔒"; }
            } else {
                if(inp1) inp1.disabled = false; 
                if(inp2) inp2.disabled = false;
                if(btn) { btn.classList.remove('bloqueado'); btn.innerHTML = "🔓"; }
            }
            processarGrupo(grupoId);
        }

        function alterarPlacarGrupo(grupoId, jogoIdx, campo, valor) {
            const chave = `${grupoId}_${jogoIdx}`;
            if (!databaseGrupos[chave]) databaseGrupos[chave] = { p1: "", p2: "", travado: false };
            if (databaseGrupos[chave].travado) return;

            databaseGrupos[chave][campo] = valor !== "" ? parseInt(valor) : "";
            salvarDados();
            processarGrupo(grupoId);
        }

        function processarGrupo(grupoId) {
            const dadosGrupo = estruturaCopa[grupoId];
            let stats = {};

            dadosGrupo.times.forEach(t => {
                stats[t] = { pts: 0, v: 0, e: 0, d: 0, gp: 0, gc: 0, sg: 0 };
            });

            dadosGrupo.jogos.forEach((j, idx) => {
                const chave = `${grupoId}_${idx}`;
                const jogo = databaseGrupos[chave];

                if (jogo && jogo.p1 !== "" && jogo.p2 !== "") {
                    const g1 = jogo.p1; const g2 = jogo.p2;
                    stats[j.t1].gp += g1; stats[j.t1].gc += g2;
                    stats[j.t2].gp += g2; stats[j.t2].gc += g1;

                    if (g1 > g2) {
                        stats[j.t1].pts += 3; stats[j.t1].v += 1; stats[j.t2].d += 1;
                    } else if (g1 < g2) {
                        stats[j.t2].pts += 3; stats[j.t2].v += 1; stats[j.t1].d += 1;
                    } else {
                        stats[j.t1].pts += 1; stats[j.t1].e += 1;
                        stats[j.t2].pts += 1; stats[j.t2].e += 1;
                    }
                }
            });

            dadosGrupo.times.forEach(t => stats[t].sg = stats[t].gp - stats[t].gc);

            let ranking = [...dadosGrupo.times];
            ranking.sort((a, b) => {
                if (stats[b].pts !== stats[a].pts) return stats[b].pts - stats[a].pts;
                if (stats[b].sg !== stats[a].sg) return stats[b].sg - stats[a].sg;
                return stats[b].gp - stats[a].gp;
            });

            const tbody = document.getElementById(`tbody-${grupoId}`);
            if (!tbody) return;
            tbody.innerHTML = "";

            ranking.forEach((time, pos) => {
                const s = stats[time];
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${pos + 1}º</td>
                    <td class="align-left">${time}</td>
                    <td class="col-ponto">${s.pts}</td>
                    <td>${s.v}</td>
                    <td>${s.e}</td>
                    <td>${s.gp}</td>
                    <td>${s.sg}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function alterarTextoMata(jogoId, campo, valor) {
            if (!databaseMataMata[jogoId]) databaseMataMata[jogoId] = { t1:"", t2:"", p1:"", p2:"", travado: false };
            if (databaseMataMata[jogoId].travado) return;

            databaseMataMata[jogoId][campo] = valor;
            salvarDados();
        }

        function alterarPlacarMata(jogoId, campo, valor) {
            if (!databaseMataMata[jogoId]) databaseMataMata[jogoId] = { t1:"", t2:"", p1:"", p2:"", travado: false };
            if (databaseMataMata[jogoId].travado) return;

            databaseMataMata[jogoId][campo] = valor !== "" ? parseInt(valor) : "";
            salvarDados();
        }

        function toggleTravaMata(jogoId) {
            if (!databaseMataMata[jogoId]) databaseMataMata[jogoId] = { t1:"", t2:"", p1:"", p2:"", travado: false };
            const jogo = databaseMataMata[jogoId];

            if (jogo.t1 === "" || jogo.t2 === "" || jogo.p1 === "" || jogo.p2 === "") {
                alert("Preencha as equipes e o placar completo antes de travar o resultado.");
                return;
            }

            jogo.travado = !jogo.travado;
            salvarDados();

            const inTime1 = document.getElementById(`m-t1-${jogoId}`);
            const inTime2 = document.getElementById(`m-t2-${jogoId}`);
            const inPlac1 = document.getElementById(`m-p1-${jogoId}`);
            const inPlac2 = document.getElementById(`m-p2-${jogoId}`);
            const btn = document.getElementById(`btn-m-${jogoId}`);

            if (jogo.travado) {
                if(inTime1) inTime1.disabled = true; if(inTime2) inTime2.disabled = true;
                if(inPlac1) inPlac1.disabled = true; if(inPlac2) inPlac2.disabled = true;
                if(btn) { btn.classList.add('bloqueado'); btn.innerHTML = "🔒"; }
            } else {
                if(inTime1) inTime1.disabled = false; if(inTime2) inTime2.disabled = false;
                if(inPlac1) inPlac1.disabled = false; if(inPlac2) inPlac2.disabled = false;
                if(btn) { btn.classList.remove('bloqueado'); btn.innerHTML = "🔓"; }
            }
        }

        function renderizarGrupos() {
            const wrapper = document.getElementById('wrapper-fase-grupos');
            if(!wrapper) return;
            wrapper.innerHTML = "";

            Object.keys(estruturaCopa).forEach(grupoId => {
                const dadosGrupo = estruturaCopa[grupoId];
                const card = document.createElement('div');
                card.className = 'card-grupo';
                
                let blocoJogosHtml = '';
                dadosGrupo.jogos.forEach((j, idx) => {
                    const chave = `${grupoId}_${idx}`;
                    const val1 = databaseGrupos[chave]?.p1 ?? "";
                    const val2 = databaseGrupos[chave]?.p2 ?? "";
                    const travado = databaseGrupos[chave]?.travado ?? false;

                    blocoJogosHtml += `
                        <div class="linha-confronto">
                            <span class="info-data-hora">${j.d}</span>
                            <span class="time-confronto">${j.t1}</span>
                            <div class="area-placar">
                                <input type="number" id="input-${grupoId}-${idx}-1" class="input-placar" value="${val1}" ${travado ? 'disabled' : ''} oninput="alterarPlacarGrupo('${grupoId}', ${idx}, 'p1', this.value)">
                                <span class="vs-separador">x</span>
                                <input type="number" id="input-${grupoId}-${idx}-2" class="input-placar" value="${val2}" ${travado ? 'disabled' : ''} oninput="alterarPlacarGrupo('${grupoId}', ${idx}, 'p2', this.value)">
                            </div>
                            <span class="time-confronto time-direita">${j.t2}</span>
                            <button id="btn-${grupoId}-${idx}" class="btn-trava ${travado ? 'bloqueado' : ''}" onclick="toggleTravaGrupo('${grupoId}', ${idx})">
                                ${travado ? '🔒' : '🔓'}
                            </button>
                        </div>
                    `;
                });

                card.innerHTML = `
                    <div class="titulo-grupo">Grupo ${grupoId}</div>
                    <table class="tabela-classificacao">
                        <thead>
                            <tr>
                                <th style="width: 10%">P</th>
                                <th class="align-left" style="width: 35%">Seleção</th>
                                <th style="width: 11%">PTS</th>
                                <th style="width: 11%">V</th>
                                <th style="width: 11%">E</th>
                                <th style="width: 11%">GP</th>
                                <th style="width: 11%">SG</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-${grupoId}"></tbody>
                    </table>
                    <div class="bloco-jogos">
                        ${blocoJogosHtml}
                    </div>
                `;
                
                wrapper.appendChild(card);
                processarGrupo(grupoId);
            });
        }

        function renderizarMataMata() {
            const wrapper = document.getElementById('wrapper-mata-mata');
            if(!wrapper) return;
            wrapper.innerHTML = "";

            Object.keys(estruturaMataMata).forEach(faseNome => {
                const listaConfrontos = estruturaMataMata[faseNome];
                const cardFase = document.createElement('div');
                cardFase.className = 'card-fase-mata';
                
                let jogosHtml = `<div class="titulo-grupo">${faseNome}</div>`;
                
                listaConfrontos.forEach(c => {
                    const jogoSalvo = databaseMataMata[c.id];
                    const t1 = jogoSalvo?.t1 ?? "";
                    const t2 = jogoSalvo?.t2 ?? "";
                    const p1 = jogoSalvo?.p1 ?? "";
                    const p2 = jogoSalvo?.p2 ?? "";
                    const travado = jogoSalvo?.travado ?? false;

                    jogosHtml += `
                        <div class="linha-confronto">
                            <div class="time-confronto">
                                <input type="text" id="m-t1-${c.id}" value="${t1}" placeholder="Equipe A" ${travado ? 'disabled' : ''} oninput="alterarTextoMata('${c.id}', 't1', this.value)">
                            </div>
                            <div class="area-placar">
                                <input type="number" id="m-p1-${c.id}" class="input-placar" value="${p1}" ${travado ? 'disabled' : ''} oninput="alterarPlacarMata('${c.id}', 'p1', this.value)">
                                <span class="vs-separador">x</span>
                                <input type="number" id="m-p2-${c.id}" class="input-placar" value="${p2}" ${travado ? 'disabled' : ''} oninput="alterarPlacarMata('${c.id}', 'p2', this.value)">
                            </div>
                            <div class="time-confronto time-direita">
                                <input type="text" id="m-t2-${c.id}" value="${t2}" placeholder="Equipe B" ${travado ? 'disabled' : ''} oninput="alterarTextoMata('${c.id}', 't2', this.value)">
                            </div>
                            <button id="btn-m-${c.id}" class="btn-trava ${travado ? 'bloqueado' : ''}" onclick="toggleTravaMata('${c.id}')">
                                ${travado ? '🔒' : '🔓'}
                            </button>
                        </div>
                    `;
                });

                cardFase.innerHTML = jogosHtml;
                wrapper.appendChild(cardFase);
            });
        }

        // Inicialização limpa
        window.onload = function() {
            carregarDados();
            renderizarGrupos();
            renderizarMataMata();
        };
    </script>
</body>
</html>
