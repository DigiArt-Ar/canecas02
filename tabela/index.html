<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela Interativa - Copa do Mundo 2026</title>
    <style>
        :root {
            --bg-principal: #0f1115;
            --bg-card: #161920;
            --bg-input: #1e222b;
            --cor-borda: #2a2f3b;
            --amarelo-destaque: #eff2f7;
            --laranja-copa: #ff6b00;
            --verde-sucesso: #00e676;
            --texto-claro: #f1f3f5;
            --texto-escuro: #9ea7b3;
            --trava-vermelha: #ff3838;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-claro);
            padding: 15px;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--cor-borda);
        }

        header h1 {
            font-size: 1.5rem;
            color: var(--laranja-copa);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        header p {
            font-size: 0.85rem;
            color: var(--texto-escuro);
            margin-top: 5px;
        }

        .secao-titulo {
            text-align: center;
            font-size: 1.3rem;
            color: var(--laranja-copa);
            text-transform: uppercase;
            margin: 30px 0 20px 0;
            padding: 10px;
            background-color: rgba(255, 107, 0, 0.05);
            border-radius: 6px;
            border: 1px solid rgba(255, 107, 0, 0.15);
            letter-spacing: 1px;
        }

        .container-grupos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card-grupo {
            background-color: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--cor-borda);
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .titulo-grupo {
            font-size: 1.1rem;
            color: var(--laranja-copa);
            font-weight: bold;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 2px solid var(--laranja-copa);
            text-transform: uppercase;
        }

        .tabela-classificacao {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
            font-size: 0.82rem;
            text-align: center;
        }

        .tabela-classificacao th {
            color: var(--texto-escuro);
            padding: 6px 2px;
            font-weight: 600;
            border-bottom: 1px solid var(--cor-borda);
        }
